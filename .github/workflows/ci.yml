name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smash2:
    name: smash2 (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reimplementation/adl2
    steps:
      - uses: actions/checkout@v4
      - name: Install z3
        run: sudo apt-get update && sudo apt-get install -y z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reimplementation/adl2
      - name: Build
        run: cargo build --release --workspace
      - name: Test
        run: cargo test --release --workspace

  legacy:
    name: legacy smash (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison libfl-dev clang graphviz z3
      - name: Build
        run: make
      - name: Golden suite + corpus sweep + z3 spike
        run: make -C legacy_parser test
